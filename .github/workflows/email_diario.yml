name: Email Diario de Mercados

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 9AM Madrid hora de verano (CEST, UTC+2)
    - cron: '0 8 * * 1-5'  # 9AM Madrid hora de invierno (CET, UTC+1)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  enviar-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance pandas requests feedparser

      - name: Comprobar hora de Madrid y enviar email
        env:
          EMAIL_REMITENTE: ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
        run: |
          HORA_MADRID=$(TZ="Europe/Madrid" date +%H)
          echo "Hora actual en Madrid: ${HORA_MADRID}:00"
          if [ "$HORA_MADRID" = "09" ]; then
            echo "Son las 9AM en Madrid — ejecutando email diario..."
            python dashboard.py --daily
          else
            echo "Workflow disparado fuera de hora (${HORA_MADRID}h Madrid) — omitiendo envío."
          fi
